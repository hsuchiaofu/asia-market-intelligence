<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>熱門報告｜Asia Market Intelligence</title><meta name="description" content="依公開閱讀次數排列的熱門市場報告。"><link rel="stylesheet" href="assets/css/style.css"><link rel="icon" href="favicon.svg"></head><body data-root="."><header class="site-header"><nav class="nav"><a class="brand" href="index.html">AMI</a><div class="nav-links open"><a href="index.html">首頁</a><a href="archive.html">歷史報告</a></div><button class="icon-button" data-theme-toggle>明／暗</button></nav></header><main class="container"><span class="eyebrow">Reader Rankings</span><h1>熱門報告</h1><p class="muted">公開閱讀次數為近似值，不代表精準真人訪客數。</p><div id="popular" class="state" aria-live="polite">正在取得排行…</div></main><script src="assets/js/theme.js"></script><script src="assets/js/reports.js"></script><script>document.addEventListener('DOMContentLoaded',async()=>{const el=document.querySelector('#popular');try{const reports=await AMI.load();if(!reports.length){el.textContent='尚無正式報告';return}const r=await fetch('/api/views/batch',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({paths:reports.map(x=>'/'+x.file)})});if(!r.ok)throw 0;const d=await r.json(),m=new Map(d.views.map(x=>[x.path,x.views]));reports.sort((a,b)=>(m.get('/'+b.file)||0)-(m.get('/'+a.file)||0));AMI.render(reports,el)}catch(_){el.textContent='閱讀次數服務暫時無法使用，尚無排行可顯示。'}})</script></body></html>
